<!-- Tìm đoạn hàm render(data) và thay thế bằng đoạn dưới đây -->
<script>
    function render(data) {
        const container = document.getElementById('ranking-list');
        container.innerHTML = data.map((p, i) => {
            // Tính toán Elo tổng ngay trong lúc render
            const totalElo = p.intel + p.biq + p.tac + p.exp;
            
            return `
            <div class="card-${p.tier.type} flex flex-wrap md:flex-nowrap items-center gap-6 p-6 rounded-lg border border-zinc-900 hover:border-zinc-700 transition-all group animate-in fade-in duration-500">
                <!-- Thứ hạng -->
                <div class="text-zinc-800 font-black italic text-3xl w-10">#${i + 1}</div>
                
                <!-- Profile Tuyển thủ -->
                <div class="relative">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" 
                         class="w-20 h-20 rounded-full object-cover border-2 border-zinc-800 group-hover:border-yellow-500 transition-all shadow-2xl">
                    <div class="absolute -bottom-1 -right-1 bg-yellow-500 text-black text-[8px] font-active px-1 rounded font-bold">PRO</div>
                </div>

                <div class="flex-grow">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-2">
                        <div>
                            <h3 class="text-2xl font-black tracking-tighter uppercase group-hover:text-yellow-500 transition-colors">
                                ${p.name}
                            </h3>
                            <div class="${p.tier.class} inline-block px-4 py-0.5 mt-1 text-[11px] font-black italic rounded-full uppercase tracking-widest">
                                Tier ${p.tier.label}
                            </div>
                        </div>
                        
                        <!-- Dòng tổng số Elo -->
                        <div class="text-right">
                            <span class="block text-[10px] font-bold text-zinc-600 uppercase tracking-[0.3em]">Total Potential Elo</span>
                            <span class="text-4xl font-black text-white italic drop-shadow-md">★ ${totalElo.toLocaleString()}</span>
                        </div>
                    </div>

                    <!-- Hiển thị HT/LT thay cho số điểm cụ thể -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${statRow("Intelligence", p.intel, "bg-blue-500")}
                        ${statRow("Battle IQ", p.biq, "bg-red-500")}
                        ${statRow("Tactics", p.tac, "bg-yellow-500")}
                        ${statRow("Experience", p.exp, "bg-emerald-500")}
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    function statRow(label, val, color) {
        // Chuyển đổi số điểm sang nhãn HT/LT
        let tierLabel = "";
        if (val >= 450) tierLabel = "HT1";
        else if (val >= 400) tierLabel = "LT1";
        else if (val >= 340) tierLabel = "HT2";
        else if (val >= 280) tierLabel = "LT2";
        else if (val >= 190) tierLabel = "HT3";
        else tierLabel = "LT3";

        const percent = (val / 500) * 100;
        
        return `
            <div class="space-y-1">
                <div class="flex justify-between text-[9px] font-bold text-zinc-500 uppercase tracking-tighter">
                    <span>${label}</span>
                    <span class="text-yellow-500 font-black">${tierLabel}</span>
                </div>
                <div class="stat-bar-bg h-[6px] bg-zinc-900 rounded-full overflow-hidden">
                    <div class="stat-fill ${color} h-full rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                </div>
            </div>
        `;
    }
</script>
