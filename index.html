<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessTier | Stats System</title>
    <script src="https://cdn.tailwindcss.org"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f111a; color: #ffffff; }
        
        .badge-ht1 { color: #ffd700; border: 1px solid #ffd700; background: rgba(255,215,0,0.1); }
        .badge-ht2 { color: #f97316; border: 1px solid #f97316; background: rgba(249,115,22,0.1); }
        .badge-ht3 { color: #fb923c; border: 1px solid #fb923c; background: rgba(251,146,60,0.1); }
        .badge-lt1 { color: #94a3b8; border: 1px solid #94a3b8; background: rgba(148,163,184,0.1); }
        .badge-lt2 { color: #64748b; border: 1px solid #64748b; background: rgba(100,116,139,0.1); }
        
        .stat-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1d2b;
            border: 2px solid #2d3142;
            font-size: 1.2rem;
        }

        .avatar-na {
            width: 60px;
            height: 60px;
            background: #452222;
            color: #ff5555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            border-radius: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-black uppercase tracking-widest mb-8 border-b border-zinc-800 pb-4 text-zinc-500">Official Rankings</h1>
        <div id="ranking-list" class="space-y-4"></div>
    </div>

    <script>
        function getTierInfo(score) {
            if (score >= 450) return { label: "HT1", class: "badge-ht1" };
            if (score >= 400) return { label: "LT1", class: "badge-lt1" };
            if (score >= 340) return { label: "HT2", class: "badge-ht2" };
            if (score >= 280) return { label: "LT2", class: "badge-lt2" };
            return { label: "HT3", class: "badge-ht3" };
        }

        function render(data) {
            const container = document.getElementById('ranking-list');
            container.innerHTML = data.map((p) => {
                const totalElo = p.intel + p.biq + p.tac + p.exp;
                const initial = p.name ? p.name.charAt(0).toUpperCase() : "?";

                return `
                <div class="bg-[#141721] p-4 rounded-xl flex items-center gap-4 md:gap-6 border border-zinc-800/50">
                    <div class="avatar-na">${initial}</div>
                    
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg font-bold text-zinc-200 uppercase">${p.name}</h3>
                            <div class="text-right">
                                <span class="text-[9px] text-zinc-500 font-bold block">TOTAL ELO</span>
                                <span class="text-xl font-black text-yellow-500 italic">${totalElo}</span>
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-4">
                            ${statIcon("⚔️", p.intel)}
                            ${statIcon("🧠", p.biq)}
                            ${statIcon("🎯", p.tac)}
                            ${statIcon("🔥", p.exp)}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function statIcon(emoji, score) {
            const tier = getTierInfo(score);
            return `
                <div class="flex flex-col items-center gap-1">
                    <div class="stat-circle">${emoji}</div>
                    <span class="${tier.class} text-[9px] font-black px-2 py-0.5 rounded text-center min-w-[35px]">${tier.label}</span>
                </div>
            `;
        }

        async function init() {
            try {
                const res = await fetch('players.json'); 
                if (!res.ok) throw new Error('Không tìm thấy file players.json');
                const data = await res.json();
                data.sort((a, b) => (b.intel+b.biq+b.tac+b.exp) - (a.intel+a.biq+a.tac+a.exp));
                render(data);
            } catch (e) {
                console.error(e);
                document.getElementById('ranking-list').innerHTML = `<p class="text-red-400 font-bold">Lỗi: ${e.message}</p>`;
            }
        }
        init();
    </script>
</body>
</html>
