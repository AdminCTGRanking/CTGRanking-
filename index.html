<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessTier | Pro Rankings</title>
    <script src="https://cdn.tailwindcss.org"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap');
        body { font-family: 'Oxanium', sans-serif; background-color: #050505; color: #ffffff; }
        .card-ht { border-left: 5px solid #facc15; background: linear-gradient(90deg, rgba(250,204,21,0.05) 0%, #0f0f0f 100%); }
        .card-lt { border-left: 5px solid #64748b; background: linear-gradient(90deg, rgba(100,116,139,0.05) 0%, #0f0f0f 100%); }
        .badge-ht1 { background: #facc15; color: #000; }
        .badge-lt1 { background: #94a3b8; color: #000; }
        .badge-ht2 { background: #ca8a04; color: #fff; }
        .badge-lt2 { background: #475569; color: #fff; }
        .badge-ht3 { background: #713f12; color: #fff; }
        .badge-lt3 { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body class="p-6 md:p-12 text-zinc-100">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-5xl font-black italic tracking-tighter uppercase">CHESS<span class="text-yellow-500 text-6xl">TIER</span></h1>
                <p class="text-zinc-500 font-bold text-[10px] tracking-[0.4em] uppercase mt-2 underline decoration-yellow-500/50">Official Database</p>
            </div>
            <div class="w-full md:w-72">
                <input type="text" id="searchInput" placeholder="TÌM TÊN KỲ THỦ..." 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-lg py-3 px-4 text-sm font-bold tracking-widest focus:outline-none focus:border-yellow-500 transition-colors uppercase">
            </div>
        </header>

        <div id="ranking-list" class="space-y-6"></div>
    </div>

    <script>
        let allPlayers = [];

        function getTierFromScore(score) {
            if (score >= 450) return { label: "HT1", type: "ht", class: "badge-ht1" };
            if (score >= 400) return { label: "LT1", type: "lt", class: "badge-lt1" };
            if (score >= 340) return { label: "HT2", type: "ht", class: "badge-ht2" };
            if (score >= 280) return { label: "LT2", type: "lt", class: "badge-lt2" };
            if (score >= 190) return { label: "HT3", type: "ht", class: "badge-ht3" };
            return { label: "LT3", type: "lt", class: "badge-lt3" };
        }

        // Tier cho tổng Elo (Dựa trên trung bình 4 mảng)
        function getGlobalTier(totalElo) {
            const avg = totalElo / 4;
            return getTierFromScore(avg);
        }

        function render(data) {
            const container = document.getElementById('ranking-list');
            container.innerHTML = data.map((p, i) => {
                const totalElo = p.intel + p.biq + p.tac + p.exp;
                const globalTier = getGlobalTier(totalElo);

                return `
                <div class="card-${globalTier.type} flex flex-wrap md:flex-nowrap items-center gap-6 p-6 rounded-lg border border-zinc-900 hover:border-zinc-700 transition-all group animate-in fade-in duration-700">
                    <div class="text-zinc-800 font-black italic text-4xl w-12">#${i + 1}</div>
                    
                    <img src="${p.img || 'https://i.pravatar.cc/150?u=' + p.name}" 
                         class="w-24 h-24 rounded-full object-cover border-4 border-zinc-900 group-hover:border-yellow-500 transition-all shadow-2xl">
                    
                    <div class="flex-grow">
                        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-2">
                            <div>
                                <h3 class="text-3xl font-black tracking-tighter uppercase group-hover:text-yellow-500 transition-colors">${p.name}</h3>
                                <div class="${globalTier.class} inline-block px-4 py-0.5 mt-1 text-[11px] font-black italic rounded-full uppercase">RANK ${globalTier.label}</div>
                            </div>
                            <div class="text-right">
                                <span class="block text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Total Skill Elo</span>
                                <span class="text-4xl font-black text-white italic">★ ${totalElo.toLocaleString()}</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            ${statRow("Intel", p.intel, "bg-blue-500")}
                            ${statRow("B-IQ", p.biq, "bg-red-500")}
                            ${statRow("Tac", p.tac, "bg-yellow-500")}
                            ${statRow("Exp", p.exp, "bg-emerald-500")}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function statRow(label, val, color) {
            const tier = getTierFromScore(val);
            const percent = (val / 500) * 100;
            return `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] font-bold text-zinc-500 uppercase">
                        <span>${label}</span>
                        <span class="text-yellow-500 font-black">${tier.label}</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
                        <div class="${color} h-full transition-all duration-1000" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        }

        async function init() {
            try {
                // QUAN TRỌNG: Kiểm tra file trên GitHub là player.json hay players.json
                const response = await fetch('player.json'); 
                const rawData = await response.json();
                allPlayers = rawData.sort((a, b) => (b.intel+b.biq+b.tac+b.exp) - (a.intel+a.biq+a.tac+a.exp));
                render(allPlayers);
            } catch (e) {
                console.error(e);
                document.getElementById('ranking-list').innerHTML = "<p class='text-red-500 text-center font-bold'>LỖI: KHÔNG TÌM THẤY FILE PLAYER.JSON HOẶC SAI CÚ PHÁP!</p>";
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(term));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
